<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=http://127.0.0.1:5173/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Use Vite Dev Server</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #111827;
        color: #f9fafb;
        font: 16px/1.5 system-ui, sans-serif;
      }

      main {
        width: min(560px, calc(100vw - 32px));
        padding: 24px;
        border: 1px solid #374151;
        border-radius: 16px;
        background: #1f2937;
      }

      a {
        color: #93c5fd;
      }

      code {
        font-family: Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Use the Vite dev server</h1>
      <p>
        This app is a Vite + React + TypeScript project. It will not run correctly through VS Code
        Live Server.
      </p>
      <p>
        Start the app with <code>npm run dev</code>, then open
        <a href="http://127.0.0.1:5173/">http://127.0.0.1:5173/</a>.
      </p>
    </main>
  </body>
</html>
